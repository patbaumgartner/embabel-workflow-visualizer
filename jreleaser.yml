project:
  name: embabel-workflow-visualizer
  description: Spring Boot starter that visualizes Embabel agent workflows as an actuator endpoint and interactive UI.
  website: https://github.com/patbaumgartner/embabel-workflow-visualizer
  authors:
    - Patrick Baumgartner
  license: Apache-2.0
  links:
    homepage: https://github.com/patbaumgartner/embabel-workflow-visualizer
    bugTracker: https://github.com/patbaumgartner/embabel-workflow-visualizer/issues
  java:
    groupId: com.patbaumgartner.embabel
    artifactId: embabel-workflow-visualizer-parent
    version: 21
  inceptionYear: '2024'

release:
  github:
    overwrite: true
    tagName: 'v{{projectVersion}}'
    releaseName: '{{projectVersion}}'
    changelog:
      formatted: ALWAYS
      preset: conventional-commits
      contributors:
        format: '- {{contributorName}}{{#contributorUsernameAsLink}} ({{.}}){{/contributorUsernameAsLink}}'

signing:
  active: ALWAYS
  armored: true

deploy:
  maven:
    mavenCentral:
      sonatype:
        active: ALWAYS
        url: https://central.sonatype.com/api/v1/publisher
        stagingRepositories:
          - target/staging-deploy
