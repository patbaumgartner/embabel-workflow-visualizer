# Embabel Workflow Visualizer — starter defaults
#
# The starter auto-configures the following when running in a servlet web
# environment with Spring Boot Actuator on the classpath:
#
#   GET /actuator/embabel        — actuator endpoint (workflow catalog as JSON)
#   GET /embabel-workflows/api   — REST API (workflow catalog as JSON)
#   GET /embabel-workflows       — interactive visualization UI
#
# To expose the actuator endpoint over HTTP, add to your application.properties:
#
#   management.endpoints.web.exposure.include=health,info,embabel
#
# The REST API and UI page controller are disabled by default.
# Enable both with a single property:
#
#   embabel.workflow.visualizer.enabled=true
