name: CI Build

# Runs a full build (compile + test) on every push to main.
# Snapshot versions are no longer published to GitHub Packages.
# Release artifacts are published to Maven Central via JReleaser (see release.yml).

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Build Snapshot (Java 21)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Set up JDK 21
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build and test
        run: mvn -B verify
        env:
          OPENAI_API_KEY: dummy

